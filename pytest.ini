# Pytest configuration for the Playwright BDD framework.
# These defaults make pytest produce rich HTML reports and keep test discovery predictable.
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --html=reports/pytest-report.html --self-contained-html --junitxml=reports/pytest-report.xml -n auto --reruns 1 --reruns-delay 1
markers =
    smoke: smoke tests
    regression: regression tests
    ui: UI/browser tests
filterwarnings =
    ignore::DeprecationWarning
